<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>
  <g transform="translate(80, 100)" fill="none" stroke="#d4856b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Simplified floorplan icon: walls forming rooms -->
    <rect x="0" y="0" width="352" height="280" rx="4"/>
    <line x1="176" y1="0" x2="176" y2="280"/>
    <line x1="0" y1="160" x2="176" y2="160"/>
    <!-- Door arc -->
    <path d="M 176 100 Q 216 100 216 140" fill="none"/>
    <!-- Window marks -->
    <line x1="60" y1="280" x2="120" y2="280" stroke-width="16"/>
    <!-- 3D hint: perspective line -->
    <line x1="352" y1="0" x2="320" y2="40" opacity="0.4"/>
    <line x1="352" y1="280" x2="320" y2="240" opacity="0.4"/>
  </g>
  <text x="256" y="430" font-family="sans-serif" font-size="48" font-weight="700" fill="#d4856b" text-anchor="middle" letter-spacing="4">MAP</text>
</svg>
